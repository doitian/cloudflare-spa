<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Spacing - Cloudflare SPA</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .upload-section {
            margin-bottom: 30px;
            padding: 30px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-section.drag-over {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-label {
            font-size: 1.2em;
            color: #667eea;
            cursor: pointer;
        }

        .upload-hint {
            margin-top: 10px;
            color: #666;
            font-size: 0.9em;
        }

        .controls-section {
            display: none;
            margin-bottom: 30px;
        }

        .controls-section.active {
            display: block;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .option-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
        }

        .option-btn.active {
            background: #667eea;
            color: white;
        }

        .download-btn {
            padding: 12px 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-section {
            margin-top: 20px;
            padding: 15px;
            background: #fff9e6;
            border-left: 4px solid #ffcc00;
            border-radius: 4px;
        }

        .info-section h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .info-item {
            margin-bottom: 5px;
            color: #666;
        }

        .error-message {
            display: none;
            padding: 15px;
            background: #ffe6e6;
            border-left: 4px solid #ff4444;
            border-radius: 4px;
            color: #cc0000;
            margin-bottom: 20px;
        }

        .error-message.active {
            display: block;
        }

        .preview-section {
            display: none;
            margin-bottom: 30px;
        }

        .preview-section.active {
            display: block;
        }

        .preview-container {
            width: 100%;
            min-height: 300px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-container canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #444;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
        }

        .alignment-grid {
            display: inline-grid;
            grid-template-columns: repeat(3, 44px);
            grid-template-rows: repeat(3, 44px);
            gap: 4px;
            background: #e8ebff;
            padding: 4px;
            border-radius: 8px;
        }

        .alignment-cell {
            width: 44px;
            height: 44px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.7em;
            color: #667eea;
        }

        .alignment-cell:hover {
            background: #f0f2ff;
        }

        .alignment-cell.active {
            background: #667eea;
            color: white;
        }

        .alignment-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
        }

        .alignment-labels {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            font-size: 0.85em;
            color: #666;
        }

        .processing-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .processing-overlay.active {
            display: flex;
        }

        .processing-spinner {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <h1>PDF Spacing</h1>

        <div class="error-message" id="errorMessage"></div>

        <div class="upload-section" id="uploadSection">
            <input type="file" id="fileInput" accept=".pdf,application/pdf">
            <label for="fileInput" class="upload-label">
                📄 Click to upload a PDF file
            </label>
            <p class="upload-hint">or drag and drop a PDF file here</p>
        </div>

        <div class="controls-section" id="controlsSection">
            <div class="section-title">Spacing Options</div>

            <div class="control-group">
                <label>Add space to width:</label>
                <div class="option-buttons">
                    <button class="option-btn active" data-width="0">None</button>
                    <button class="option-btn" data-width="30">+30%</button>
                    <button class="option-btn" data-width="50">+50%</button>
                    <button class="option-btn" data-width="100">+100%</button>
                </div>
            </div>

            <div class="control-group">
                <label>Add space to height:</label>
                <div class="option-buttons">
                    <button class="option-btn active" data-height="0">None</button>
                    <button class="option-btn" data-height="30">+30%</button>
                    <button class="option-btn" data-height="50">+50%</button>
                    <button class="option-btn" data-height="100">+100%</button>
                </div>
            </div>

            <div class="control-group">
                <label>Content alignment:</label>
                <div class="alignment-wrapper">
                    <div class="alignment-grid">
                        <button class="alignment-cell" data-h="left" data-v="top" title="Top Left">↖</button>
                        <button class="alignment-cell" data-h="center" data-v="top" title="Top Center">↑</button>
                        <button class="alignment-cell" data-h="right" data-v="top" title="Top Right">↗</button>
                        <button class="alignment-cell" data-h="left" data-v="middle" title="Middle Left">←</button>
                        <button class="alignment-cell active" data-h="center" data-v="middle" title="Center">●</button>
                        <button class="alignment-cell" data-h="right" data-v="middle" title="Middle Right">→</button>
                        <button class="alignment-cell" data-h="left" data-v="bottom" title="Bottom Left">↙</button>
                        <button class="alignment-cell" data-h="center" data-v="bottom" title="Bottom Center">↓</button>
                        <button class="alignment-cell" data-h="right" data-v="bottom" title="Bottom Right">↘</button>
                    </div>
                    <div class="alignment-labels">
                        <span>Horizontal: <strong id="hAlignLabel">center</strong></span>
                        <span>Vertical: <strong id="vAlignLabel">middle</strong></span>
                    </div>
                </div>
            </div>

            <button class="download-btn" id="processBtn">Download Modified PDF</button>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="section-title">File Info</div>
            <div class="info-section">
                <div class="info-item" id="fileName"></div>
                <div class="info-item" id="fileSize"></div>
                <div class="info-item" id="pageCount"></div>
                <div class="info-item" id="pageDimensions"></div>
            </div>
        </div>
    </div>

    <div class="processing-overlay" id="processingOverlay">
        <div class="processing-spinner">
            <div class="spinner"></div>
            <p>Processing PDF...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script>
        const { PDFDocument } = PDFLib;

        let pdfBytes = null;
        let pdfFileName = '';
        let widthPercent = 0;
        let heightPercent = 0;
        let hAlign = 'center';
        let vAlign = 'middle';

        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const controlsSection = document.getElementById('controlsSection');
        const previewSection = document.getElementById('previewSection');
        const errorMessage = document.getElementById('errorMessage');
        const processBtn = document.getElementById('processBtn');
        const processingOverlay = document.getElementById('processingOverlay');

        // File input change handler
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop handlers
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('drag-over');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('drag-over');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        uploadSection.addEventListener('click', () => {
            fileInput.click();
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        async function handleFile(file) {
            if (!file.type.includes('pdf') && !file.name.toLowerCase().endsWith('.pdf')) {
                showError('Please select a valid PDF file');
                return;
            }

            pdfFileName = file.name;

            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfBytes = new Uint8Array(arrayBuffer);

                const pdfDoc = await PDFDocument.load(pdfBytes);
                const pages = pdfDoc.getPages();

                // Show info
                document.getElementById('fileName').textContent = 'File: ' + pdfFileName;
                document.getElementById('fileSize').textContent = 'Size: ' + formatFileSize(file.size);
                document.getElementById('pageCount').textContent = 'Pages: ' + pages.length;

                if (pages.length > 0) {
                    const firstPage = pages[0];
                    const { width, height } = firstPage.getSize();
                    document.getElementById('pageDimensions').textContent =
                        'First page: ' + Math.round(width) + ' × ' + Math.round(height) + ' pts';
                }

                controlsSection.classList.add('active');
                previewSection.classList.add('active');
                errorMessage.classList.remove('active');
            } catch (err) {
                showError('Error reading PDF: ' + err.message);
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
            controlsSection.classList.remove('active');
            previewSection.classList.remove('active');
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' bytes';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // Width option buttons
        document.querySelectorAll('.option-btn[data-width]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn[data-width]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                widthPercent = parseInt(btn.dataset.width);
            });
        });

        // Height option buttons
        document.querySelectorAll('.option-btn[data-height]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn[data-height]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                heightPercent = parseInt(btn.dataset.height);
            });
        });

        // Alignment grid
        document.querySelectorAll('.alignment-cell').forEach(cell => {
            cell.addEventListener('click', () => {
                document.querySelectorAll('.alignment-cell').forEach(c => c.classList.remove('active'));
                cell.classList.add('active');
                hAlign = cell.dataset.h;
                vAlign = cell.dataset.v;
                document.getElementById('hAlignLabel').textContent = hAlign;
                document.getElementById('vAlignLabel').textContent = vAlign;
            });
        });

        // Process and download
        processBtn.addEventListener('click', async () => {
            if (!pdfBytes) return;

            if (widthPercent === 0 && heightPercent === 0) {
                showError('Please select at least one spacing option (width or height)');
                controlsSection.classList.add('active');
                return;
            }

            processingOverlay.classList.add('active');

            try {
                const srcDoc = await PDFDocument.load(pdfBytes);
                const newDoc = await PDFDocument.create();
                const pages = srcDoc.getPages();

                for (let i = 0; i < pages.length; i++) {
                    const srcPage = pages[i];
                    const { width: origW, height: origH } = srcPage.getSize();

                    const extraW = origW * (widthPercent / 100);
                    const extraH = origH * (heightPercent / 100);
                    const newW = origW + extraW;
                    const newH = origH + extraH;

                    // Calculate offset based on alignment
                    let offsetX = 0;
                    let offsetY = 0;

                    if (hAlign === 'left') {
                        offsetX = 0;
                    } else if (hAlign === 'center') {
                        offsetX = extraW / 2;
                    } else {
                        offsetX = extraW;
                    }

                    // PDF coordinate system: origin at bottom-left
                    if (vAlign === 'bottom') {
                        offsetY = 0;
                    } else if (vAlign === 'middle') {
                        offsetY = extraH / 2;
                    } else {
                        offsetY = extraH;
                    }

                    const [embeddedPage] = await newDoc.embedPages([srcPage]);
                    const newPage = newDoc.addPage([newW, newH]);
                    newPage.drawPage(embeddedPage, {
                        x: offsetX,
                        y: offsetY,
                        width: origW,
                        height: origH,
                    });
                }

                const modifiedBytes = await newDoc.save();
                const blob = new Blob([modifiedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                const baseName = pdfFileName.replace(/\.pdf$/i, '');
                link.download = baseName + '_spaced.pdf';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                showError('Error processing PDF: ' + err.message);
            } finally {
                processingOverlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
